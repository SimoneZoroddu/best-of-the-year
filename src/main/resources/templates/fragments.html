<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <th:block th:fragment="linkStyles">
        <link rel="stylesheet" th:href="@{/css/style.css}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    </th:block>

</head>

<body>
    <th:block th:fragment="header">
        <header>
            <nav class="navbar navbar-expand-lg bg-body-tertiary">
                <div class="container-fluid">
                    <a class="navbar-brand" href="#">Navbar</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" href="#">Home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Link</a>
                            </li>
                            <li class="nav-item dropdown">
                                <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                                    aria-expanded="false">
                                    Dropdown
                                </a>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" href="#">Action</a></li>
                                    <li><a class="dropdown-item" href="#">Another action</a></li>
                                    <li>
                                        <hr class="dropdown-divider">
                                    </li>
                                    <li><a class="dropdown-item" href="#">Something else here</a></li>
                                </ul>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link disabled" aria-disabled="true">Disabled</a>
                            </li>
                        </ul>
                        <form class="d-flex" role="search">
                            <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                            <button class="btn btn-outline-success" type="submit">Search</button>
                        </form>
                    </div>
                </div>
            </nav>
        </header>
    </th:block>


    <th:block th:fragment="footer">
        <footer class="bg-black text-light pt-5 pb-4 mt-5">
            <div class="container">
                <div class="row">
                    <div class="col-md-3 mb-4">
                        <h5 class="text-uppercase text-success">My Music</h5>
                        <p class="text-secondary small">
                            La tua app musicale semplice e veloce.
                        </p>
                    </div>
                    <div class="col-md-2 mb-4">
                        <h6 class="text-uppercase">Company</h6>
                        <a href="#" class="d-block text-secondary text-decoration-none footer-link">About</a>
                        <a href="#" class="d-block text-secondary text-decoration-none footer-link">Jobs</a>
                        <a href="#" class="d-block text-secondary text-decoration-none footer-link">For the Record</a>
                    </div>
                    <div class="col-md-2 mb-4">
                        <h6 class="text-uppercase">Communities</h6>
                        <a href="#" class="d-block text-secondary text-decoration-none footer-link">Artists</a>
                        <a href="#" class="d-block text-secondary text-decoration-none footer-link">Developers</a>
                        <a href="#" class="d-block text-secondary text-decoration-none footer-link">Advertising</a>
                    </div>
                    <div class="col-md-2 mb-4">
                        <h6 class="text-uppercase">Useful links</h6>
                        <a href="#" class="d-block text-secondary text-decoration-none footer-link">Support</a>
                        <a href="#" class="d-block text-secondary text-decoration-none footer-link">Free Mobile App</a>
                    </div>
                    <div class="col-md-3 mb-4 text-md-end text-center">
                        <a href="#" class="text-light fs-5 me-3 social-icon"><i class="bi bi-instagram"></i></a>
                        <a href="#" class="text-light fs-5 me-3 social-icon"><i class="bi bi-twitter-x"></i></a>
                        <a href="#" class="text-light fs-5 me-3 social-icon"><i class="bi bi-facebook"></i></a>
                    </div>
                </div>
                <hr class="border-secondary">
                <div class="text-center text-secondary small">
                    © 2026 My Music App
                </div>
            </div>
        </footer>
    </th:block>
</body>

</html>
