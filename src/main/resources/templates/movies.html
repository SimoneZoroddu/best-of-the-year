<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies</title>
</head>

<body>
    <h1>Movies</h1>
     <div th:each="movie : ${bestMovies}">
        <div th:object="${movie}">
            <h1 th:text="*{title}"></h1>
        </div>
    </div>
</body>

</html>
