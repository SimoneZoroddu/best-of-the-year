<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songs</title>
</head>

<body>
    <h1>Songs</h1>
    <div th:each="song : ${bestSongs}">
        <div th:object="${song}">
            <h1 th:text="*{title}"></h1>
        </div>
    </div>
</body>

</html>
