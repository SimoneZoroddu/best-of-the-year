<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songs</title>
    <th:block th:replace="~{fragments :: linkStyles}"></th:block>
</head>

<body>
    <th:block th:replace="~{fragments :: header}"></th:block>
    <h1>Songs</h1>
    <div th:each="song : ${bestSongs}">
        <div th:object="${song}">
            <h1 th:text="*{title}"></h1>
            <a th:href="@{/songs/{id}(id=${song.id})}" th:text="|Song numero ${song.id} |"></a>
        </div>
    </div>
    <th:block th:replace="~{fragments :: footer}"></th:block>
</body>

</html>
